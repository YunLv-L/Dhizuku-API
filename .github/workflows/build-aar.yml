name: Build Dhizuku-API AAR

on:
  push:
    branches: [ main, master ]   # 按需修改触发分支
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:             # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build AAR (Release)
        run: ./gradlew :dhizuku-api:assembleRelease

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhizuku-api-release
          path: dhizuku-api/build/outputs/aar/*-release.aar
